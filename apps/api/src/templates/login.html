<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - {{ project_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        secondary: '#ea580c',
                        accent: '#fb923c',
                    },
                }
            }
        }
    </script>
    <style>
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <script>
    // Redirect if already logged in - immediate, no flash
    (function() {
        const token = localStorage.getItem('access_token');
        const role = localStorage.getItem('user_role');
        
        if (token && role) {
            const roleMap = {
                'volunteer': '/dashboard/volunteer',
                'organization': '/dashboard/organization',
                'admin': '/dashboard/admin'
            };
            window.location.replace(roleMap[role.toLowerCase()] || '/');
        }
    })();
    </script>

    <div id="app">
        <!-- Simple Navigation -->
        <nav class="bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="/" class="text-2xl font-bold text-gray-900">
                            {{ project_name }}
                        </a>
                    </div>
                    <div class="flex items-center space-x-8">
                        <a href="/" class="text-gray-600 hover:text-orange-600 font-medium transition-colors">Home</a>
                        <a href="/opportunities" class="text-gray-600 hover:text-orange-600 font-medium transition-colors">Opportunities</a>
                        <a href="/register" class="px-5 py-2 bg-orange-600 text-white rounded-md hover:bg-orange-700 transition-colors font-medium">
                            Register
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <section class="py-20 bg-gray-50 min-h-screen flex items-center">
            <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 w-full">
                <div class="bg-white rounded-lg border border-gray-200 p-8">
                    <div class="text-center mb-8">
                        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
                        <p class="text-gray-600">Sign in to your account</p>
                    </div>

                    <form @submit.prevent="handleLogin">
                        <div class="space-y-4 mb-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                                <input 
                                    v-model="form.username" 
                                    type="text" 
                                    required
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                    placeholder="Enter your username">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                                <input 
                                    v-model="form.password" 
                                    type="password" 
                                    required
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                    placeholder="Enter your password">
                            </div>
                        </div>

                        <button 
                            type="submit" 
                            :disabled="loading"
                            class="w-full px-6 py-3 bg-orange-600 text-white rounded-md font-semibold hover:bg-orange-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed mb-4">
                            Sign In
                        </button>

                        <p class="text-center text-sm text-gray-600">
                            Don't have an account? 
                            <a href="/register" class="text-orange-600 hover:text-orange-700 font-medium">Register</a>
                        </p>
                    </form>

                    <!-- Role Information -->
                    <div class="mt-8 pt-8 border-t border-gray-200">
                        <p class="text-sm text-gray-600 mb-4 text-center font-medium">Account Types</p>
                        <div class="space-y-2 text-sm text-gray-600">
                            <div class="flex items-start">
                                <svg class="w-4 h-4 text-orange-600 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                </svg>
                                <span><strong>Volunteer:</strong> Browse and apply to opportunities</span>
                            </div>
                            <div class="flex items-start">
                                <svg class="w-4 h-4 text-orange-600 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                </svg>
                                <span><strong>Organization:</strong> Post opportunities (requires verification)</span>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 mt-4 text-center italic">
                            Note: Admin accounts are created by system administrators
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sonner@1.3.1/dist/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sonner@1.3.1/dist/styles.css">
    <script>
    const { createApp } = Vue;
    const { toast } = window.Sonner;

    createApp({
        data() {
            return {
                loading: false,
                form: {
                    username: '',
                    password: ''
                }
            };
        },
        methods: {
            async handleLogin() {
                this.loading = true;

                try {
                    // Prepare form data for OAuth2 password flow
                    const formData = new URLSearchParams();
                    formData.append('username', this.form.username);
                    formData.append('password', this.form.password);

                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData
                    });

                    // Check if response is JSON
                    const contentType = response.headers.get('content-type');
                    if (!contentType || !contentType.includes('application/json')) {
                        const text = await response.text();
                        console.error('Non-JSON response:', text);
                        throw new Error('Server returned an error. Please check your credentials and try again.');
                    }

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.detail || 'Login failed');
                    }

                    // Store token and user data in localStorage
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', data.user.role);
                    localStorage.setItem('user_id', data.user.id);
                    localStorage.setItem('username', data.user.username);
                    
                    toast.success('Welcome back!', { 
                        description: `Logged in as ${data.user.username}`
                    });
                    
                    // Role-based redirect
                    setTimeout(() => {
                        const role = data.user.role.toLowerCase();
                        if (role === 'volunteer') {
                            window.location.href = '/dashboard/volunteer';
                        } else if (role === 'organization') {
                            window.location.href = '/dashboard/organization';
                        } else if (role === 'admin') {
                            window.location.href = '/dashboard/admin';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);

                } catch (err) {
                    toast.error('Login Failed', { 
                        description: err.message
                    });
                } finally {
                    this.loading = false;
                }
            }
        }
    }).mount('#app');
    </script>
</body>
</html>
